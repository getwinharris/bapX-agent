<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bapX — The Agent That Grows With You</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #9651b8; --bg: #06060e; --fg: #e8e8f0; --muted: #6b7280; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg); min-height: 100vh;
      -webkit-font-smoothing: antialiased; display: flex; flex-direction: column;
    }
    .container { max-width: 1120px; margin: 0 auto; padding: 0 2rem; width: 100%; }

    /* Nav */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.25rem 2rem; max-width: 1120px; margin: 0 auto; width: 100%;
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    nav .logo a { color: #fff; text-decoration: none; font-size: 1.3rem; font-weight: 700; letter-spacing: -0.03em; }
    nav .logo a span { color: var(--accent); }
    nav .links { display: flex; gap: 1.5rem; align-items: center; }
    nav .links a { color: #8890a0; text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
    nav .links a:hover { color: #fff; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.6rem 1.25rem; border-radius: 0.5rem;
      font-size: 0.875rem; font-weight: 600; text-decoration: none; cursor: pointer;
      transition: all 0.2s; border: none; font-family: inherit; line-height: 1;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #7a3f9e; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(150,81,184,0.25); }
    .btn-ghost { color: #8890a0; background: transparent; }
    .btn-ghost:hover { color: #fff; }

    /* Hero */
    .hero {
      padding: 5rem 2rem 3rem; text-align: center; flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.35rem 1rem; border-radius: 100px;
      background: rgba(150,81,184,0.08); border: 1px solid rgba(150,81,184,0.12);
      color: var(--accent); font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.04em; margin-bottom: 2rem; animation: fadeIn 0.8s ease;
    }
    .hero h1 {
      font-size: 3.75rem; font-weight: 800; line-height: 1.05;
      letter-spacing: -0.035em; margin-bottom: 1.25rem; animation: fadeIn 1s ease;
    }
    .hero h1 span {
      background: linear-gradient(135deg, #9651b8 0%, #c084e6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 1.1rem; color: var(--muted); max-width: 480px;
      margin: 0 auto 2.25rem; line-height: 1.7; animation: fadeIn 1.2s ease;
    }
    .hero-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; animation: fadeIn 1.4s ease; }
    .hero-actions .btn { padding: 0.75rem 1.75rem; font-size: 0.9375rem; border-radius: 0.5rem; }

    /* Footer */
    footer {
      padding: 2.5rem 2rem; text-align: center;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    footer a { color: #4b5563; text-decoration: none; font-size: 0.8125rem; margin: 0 1.25rem; transition: color 0.2s; }
    footer a:hover { color: #8890a0; }

    @media (max-width: 640px) {
      .hero h1 { font-size: 2.25rem; }
      nav .links a:not(.btn) { display: none; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo"><a href="/">bap<span>X</span></a></div>
    <div class="links">
      <a href="https://github.com/getwinharris">GitHub</a>
      <a href="https://app.bapx.in">Dashboard</a>
      <a href="https://app.bapx.in" class="btn btn-primary">Get Started</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-badge">YOUR AGENTS · YOUR KEYS</div>
    <h1>The Agent That<br><span>Grows With You.</span></h1>
    <p>Deploy autonomous AI agents with your own API keys. No lock-in. No markup. Just your browser.</p>
    <div class="hero-actions">
      <a href="https://app.bapx.in" class="btn btn-primary">Get Started</a>
      <a href="https://app.bapx.in" class="btn btn-ghost">Launch Dashboard</a>
    </div>
  </section>

  <footer>
    <a href="https://github.com/getwinharris">GitHub</a>
    <a href="/login">Sign In</a>
    <a href="/signup">Sign Up</a>
  </footer>
</body>
</html>
