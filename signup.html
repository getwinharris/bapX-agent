<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting — bapX</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #9651b8; --bg: #06060e; --fg: #e8e8f0; }
    body {
      font-family: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased; padding: 2rem;
    }
    .logo { margin-bottom: 2rem; }
    .logo a { color: #fff; text-decoration: none; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .logo a span { color: var(--accent); }
    p { color: #6b7280; font-size: 0.9375rem; margin-bottom: 1rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
  <meta http-equiv="refresh" content="0;url=https://app.bapx.in">
</head>
<body>
  <div class="logo"><a href="/">bap<span>X</span></a></div>
  <p>Redirecting to dashboard...</p>
  <p><a href="https://app.bapx.in">Click here if not redirected</a></p>
</body>
</html>
