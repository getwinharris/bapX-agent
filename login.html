<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — bapX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #9651b8; --bg: #06060e; --fg: #e8e8f0; --muted: #6b7280; --border: rgba(255,255,255,0.08); }
    body {
      font-family: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased; padding: 2rem;
    }
    .logo { margin-bottom: 2rem; animation: fadeIn 0.6s ease; }
    .logo a { color: #fff; text-decoration: none; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .logo a span { color: var(--accent); }
    .card { background: rgba(255,255,255,0.015); border: 1px solid var(--border); border-radius: 1rem; padding: 2.5rem; width: 100%; max-width: 400px; animation: fadeIn 0.8s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
    .field { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.8125rem; font-weight: 500; color: #9ca3af; margin-bottom: 0.375rem; }
    input { width: 100%; padding: 0.75rem 0.875rem; border-radius: 0.5rem; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--fg); font-size: 0.9375rem; font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(150,81,184,0.1); }
    input::placeholder { color: #4b5563; }
    .btn { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: none; background: var(--accent); color: #fff; font-size: 0.9375rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; margin-top: 0.5rem; }
    .btn:hover { background: #7a3f9e; box-shadow: 0 4px 16px rgba(150,81,184,0.25); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 0.8125rem; margin-top: 0.75rem; display: none; }
    .footer { margin-top: 1.5rem; text-align: center; font-size: 0.8125rem; color: var(--muted); }
    .footer a { color: #8890a0; text-decoration: underline; text-underline-offset: 2px; transition: color 0.2s; }
    .footer a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="logo"><a href="/">bap<span>X</span></a></div>
  <div class="card">
    <h1>Welcome <span>back</span></h1>
    <p class="subtitle">Sign in to your account.</p>
    <div id="error" class="error"></div>
    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn" id="submit-btn">Sign In</button>
    </form>
    <div class="footer">Don't have an account? <a href="/signup">Sign Up</a></div>
  </div>
  <script>
    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("error");
    const submitBtn = document.getElementById("submit-btn");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.style.display = "none";
      submitBtn.disabled = true; submitBtn.textContent = "Signing in...";
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        const res = await fetch("/api/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (res.ok) {
          window.location.href = "https://app.bapx.in";
        } else {
          errorEl.textContent = data.detail || "Sign in failed";
          errorEl.style.display = "block";
          submitBtn.disabled = false; submitBtn.textContent = "Sign In";
        }
      } catch (err) {
        errorEl.textContent = "Network error. Please try again.";
        errorEl.style.display = "block";
        submitBtn.disabled = false; submitBtn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
